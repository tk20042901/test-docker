<!DOCTYPE html>
<html>
<head>
    <title>FastAPI Chatbot</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .chat-container { width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 5px; }
        .user { background-color: #e1f5fe; text-align: right; }
        .bot { background-color: #f1f8e9; text-align: left; }
        input[type="text"] { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Simple Chatbot</h2>
        
        {% if response %}
            <div class="message user"><strong>Bạn:</strong> {{ user_message }}</div>
            <div class="message bot"><strong>Bot:</strong> {{ response }}</div>
        {% endif %}

        <hr>
        <form action="/chatbot" method="post">
            <input type="text" name="message" placeholder="Nhập tin nhắn..." required>
            <button type="submit">Gửi</button>
        </form>
        <br>
        <a href="/">Làm mới đoạn hội thoại</a>
    </div>
</body>
</html>
